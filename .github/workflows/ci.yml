name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Check generated Python badge
        if: matrix.python-version == '3.12'
        run: python scripts/sync_badges.py --check
      - name: Check README registry installs
        if: matrix.python-version == '3.12'
        run: python scripts/check_readme_installs.py
      - name: Check README ecosystem table in sync with ecosystem.yaml
        if: matrix.python-version == '3.12'
        run: |
          pip install actenon-protocol --quiet
          python -m actenon_protocol.ecosystem --check README.md --repo actenon-scan

      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: python -m pytest tests/ -v
