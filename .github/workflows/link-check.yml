name: Link check
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # nightly: catches breaks caused by sibling repos
jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --include-fragments
            --exclude-path node_modules
            --exclude-path .venv
            --accept 200,206,429
            './**/*.md'
          fail: true
