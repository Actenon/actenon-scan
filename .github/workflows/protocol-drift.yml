name: Protocol drift gate

# This workflow fails when scan's guard vocabulary drifts from the
# protocol's boundary contract:
#   - permit_* calls treated as guards (audit S-01 — trust-boundary collapse)
#   - non-Actenon guards not recognised (audit S-02 — vendor lock-in)
#   - remediation hints point to permit for verification (audit S-11)
#   - scan has a runtime dep on kernel/permit (boundary preservation)
#
# See tests/test_protocol_drift.py for the full gate.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 4 * * *"

jobs:
  drift-gate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: pip install -e ".[dev]"

      - name: Run protocol drift gate
        run: python -m pytest tests/test_protocol_drift.py -v --tb=short

      - name: Run scan's own tests
        run: python -m pytest tests/ -v --tb=short

      - name: Verify permit_* is not in guard patterns
        run: |
          python -c "
          import json
          rules = json.load(open('actenon_scan/rules/default_rules.json'))
          guard_patterns = set()
          # Support both the old 'guards' array format and the newer
          # top-level 'guard_patterns' array format.
          for g in rules.get('guards', []):
              for p in g.get('patterns', []):
                  guard_patterns.add(p)
          for p in rules.get('guard_patterns', []):
              guard_patterns.add(p)
          permit_overlap = guard_patterns & {'permit_check', 'permit_authorize', 'permit_validate'}
          assert not permit_overlap, (
              f'permit_* patterns are treated as guards: {permit_overlap}. '
              f'This collapses the trust boundary (audit S-01).'
          )
          print('OK: permit_* not in guard patterns')
          "

      - name: Verify non-Actenon guards are recognised
        run: |
          python -c "
          import json
          rules = json.load(open('actenon_scan/rules/default_rules.json'))
          guard_patterns = set()
          # Support both the old 'guards' array format and the newer
          # top-level 'guard_patterns' array format.
          for g in rules.get('guards', []):
              for p in g.get('patterns', []):
                  guard_patterns.add(p)
          for p in rules.get('guard_patterns', []):
              guard_patterns.add(p)
          required = {
              'OAuth': {'requires_scope', 'oauth_scope'},
              'RBAC': {'roles_required', 'requires_roles', 'has_role'},
              'JWT': {'jwt_required', 'verify_jwt', 'decode_jwt'},
              'OPA': {'opa_eval', 'check_opa_policy'},
              'Casbin': {'enforce', 'casbin_enforce'},
              'mTLS': {'verify_mtls', 'require_client_cert'},
          }
          missing = [fam for fam, pats in required.items() if not (guard_patterns & pats)]
          assert not missing, f'missing non-Actenon guard families: {missing}'
          print('OK: non-Actenon guards recognised')
          "
