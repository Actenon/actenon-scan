name: "actenon-scan"
description: "Scan for the AI-agent execution gap — consequential actions reachable from agent tool boundaries without proof/authority guards."
branding:
  icon: "shield"
  color: "blue"
inputs:
  path:
    description: "Path to scan (file or directory)"
    required: false
    default: "."
  fail-on:
    description: "Fail the check when findings meet this severity threshold"
    required: false
    default: "medium"
  config:
    description: "Path to config file"
    required: false
    default: ""
  baseline:
    description: "Path to baseline.json for known-findings suppression"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Install actenon-scan
      run: pip install actenon-scan
      shell: bash
    - name: Run actenon-scan
      id: scan
      run: |
        set +e
        ARGS="actenon-scan scan ${{ inputs.path }} --format sarif --output results.sarif --fail-on ${{ inputs.fail-on }}"
        if [ -n "${{ inputs.config }}" ]; then ARGS="$ARGS --config ${{ inputs.config }}"; fi
        if [ -n "${{ inputs.baseline }}" ]; then ARGS="$ARGS --baseline ${{ inputs.baseline }}"; fi
        eval $ARGS
        EXIT_CODE=$?
        echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
        exit 0
      shell: bash
    - name: Upload SARIF
      if: always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
    - name: Fail on findings
      if: ${{ steps.scan.outputs.exit_code == '1' }}
      run: exit 1
      shell: bash
